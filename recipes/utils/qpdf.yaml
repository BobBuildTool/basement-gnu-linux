inherit: [cmake]

metaEnvironment:
    PKG_LICENSE: "Apache-2.0"
    PKG_VERSION: "12.3.2"

depends:
    - libs::zlib-dev
    - virtual::libs::libjpeg-dev
    - use: []
      depends:
          - libs::zlib-tgt
          - virtual::libs::libjpeg-tgt

checkoutSCM:
    scm: url
    url: https://github.com/qpdf/qpdf/releases/download/v${PKG_VERSION}/qpdf-${PKG_VERSION}.tar.gz
    digestSHA256: 6cba2f9f2cd887d905faeb99e0e51a307b217920d1bbf3e9cfbb2e8178a2deda
    stripComponents: 1

buildScript: |
    cmakeBuild $1

provideDeps: ['*-tgt']
packageScript: |
    cmakePackageTgt

provideTools:
    qpdf: "usr/bin"
