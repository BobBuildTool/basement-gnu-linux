inherit: [autotools, autoconf, make, patch]

metaEnvironment:
    PKG_VERSION: "0.9.5"
    PKG_LICENSE: "GPL-3.0"

depends:
    - libs::openssl-dev
    - devel::binutils-dev
    - core::util-linux-dev
    - libs::gnu-efi-dev
    - use: []
      depends:
          - libs::openssl-tgt
          - core::util-linux-tgt
          - libs::gnu-efi-tgt

checkoutSCM:
    - scm: git
      url: https://git.kernel.org/pub/scm/linux/kernel/git/jejb/sbsigntools.git
      tag: v${PKG_VERSION}
    - scm: git
      url: git://git.ozlabs.org/~ccan/ccan
      # actually this is a submodule of sbsigntools.git; so if you update
      # sbsigntools make sure to update the commit id if required
      commit: b1f28e17227f2320d07fe052a8a48942fe17caa5
      dir: lib/ccan.git

checkoutDeterministic: True
checkoutToolsWeak: [target-toolchain, make]
checkoutVars: [CC]
checkoutScript: |
    patchApplySeries $<@sbsigntools/*.patch@>
    ./autogen.sh

buildVars: [ARCH]
buildScript: |
    GNUEFI="${BOB_DEP_PATHS[libs::gnu-efi-dev]}/usr"

    autotoolsBuild "$1" \
        CFLAGS=-Wno-error=maybe-uninitialized \
        CRTPATH="${GNUEFI}/lib" \
        EFI_CPPFLAGS="-I${GNUEFI}/include/efi -I${GNUEFI}/include/efi/${ARCH}"

packageScript: |
    autotoolsPackageTgt
provideTools:
    sbsigntools: "usr/bin"
