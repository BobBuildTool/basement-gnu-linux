inherit: [autotools]

metaEnvironment:
    PKG_VERSION: 5.0.1
    PKG_LICENSE: "GPL-3.0-or-later"

checkoutSCM:
    scm: url
    url: ${GNU_MIRROR}/screen/screen-${PKG_VERSION}.tar.gz
    digestSHA256: 2dae36f4db379ffcd14b691596ba6ec18ac3a9e22bc47ac239789ab58409869d
    stripComponents: 1

depends:
    - libs::libxcrypt-dev
    - libs::ncurses-dev
    - use: []
      depends:
          - libs::libxcrypt-tgt
          - libs::ncurses-tgt

buildScript: |
    # compiling screen fails if configure is used out of tree due to not found
    # headers. Copy the sources in the build directory to avoid this.
    mkdir -p build
    rsync -a $1/ build/

    autotoolsBuild $1 \
        --prefix=/usr \
        --sysconfdir=/etc \
        --disable-pam

    mkdir -p install/.bob

    # add screen as shell
    cat >install/.bob/screen.shell-table <<EOF
    /bin/screen
    /usr/bin/screen
    EOF

provideDeps: ["*-tgt"]
packageScript: |
    autotoolsPackageTgt
