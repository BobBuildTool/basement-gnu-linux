inherit: [autotools]

metaEnvironment:
    PKG_VERSION: 5.0.0
    PKG_LICENSE: "GPL-3.0-or-later"

checkoutSCM:
    scm: url
    url: ${GNU_MIRROR}/screen/screen-${PKG_VERSION}.tar.gz
    digestSHA256: f04a39d00a0e5c7c86a55338808903082ad5df4d73df1a2fd3425976aed94971
    stripComponents: 1

depends:
    - libs::libxcrypt-dev
    - libs::ncurses-dev
    - use: []
      depends:
          - libs::libxcrypt-tgt
          - libs::ncurses-tgt

buildScript: |
    # compiling screen fails if configure is used out of tree due to not found
    # headers. Copy the sources in the build directory to avoid this.
    mkdir -p build
    rsync -a $1/ build/

    autotoolsBuild $1 \
        --prefix=/usr \
        --sysconfdir=/etc \
        --disable-pam

    mkdir -p install/.bob

    # add screen as shell
    cat >install/.bob/screen.shell-table <<EOF
    /bin/screen
    /usr/bin/screen
    EOF

provideDeps: ["*-tgt"]
packageScript: |
    autotoolsPackageTgt
