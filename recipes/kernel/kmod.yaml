inherit: [autotools]

metaEnvironment:
    PKG_VERSION: "34.2"
    PKG_LICENSE: "GPL-2.0-or-later AND LGPL-2.1-or-later"

privateEnvironment:
    AUTOTOOLS_AUTO_STATIC: "no"

checkoutSCM:
    scm: url
    url: ${KERNEL_MIRROR}/linux/utils/kernel/kmod/kmod-${PKG_VERSION}.tar.gz
    digestSHA256: "d60a79fb12a85feab75674ce5b86b2c8bae1714f775f481eae926bd2657b2ffe"
    stripComponents: 1

buildScript: |
    autotoolsBuild $1 \
        --disable-manpages

multiPackage:
    "":
        depends:
            - name: kernel::kmod-lib-tgt
              use: []
        packageScript: autotoolsPackageBin
        provideDeps: [ "*-tgt" ]
        provideTools:
            kmod: usr/sbin

    lib-dev:
        packageScript: autotoolsPackageDev

    lib-tgt:
        packageScript: autotoolsPackageLib
