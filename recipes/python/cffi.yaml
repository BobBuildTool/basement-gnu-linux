inherit: ["python3::build", cpackage]

metaEnvironment:
    PKG_VERSION: "2.0.0"
    PKG_LICENSE: "MIT-0"

checkoutSCM:
    scm: url
    url: ${GITHUB_MIRROR}/python-cffi/cffi/archive/refs/tags/v${PKG_VERSION}.tar.gz
    digestSHA256: e32bea840b50779a43dcaff13dcf6fa8bc29aa1b071c2cb4e27c1bd79114a202
    stripComponents: 1

depends:
    - libs::libffi-dev
    - use: []
      depends:
          - libs::libffi-tgt

buildVars: [CC]
buildScript: |
    python3Build $1

packageScript: |
    python3PackageTgt

provideDeps: ['*-tgt']
