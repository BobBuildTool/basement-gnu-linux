inherit: ["python3-pkg", "strip"]

metaEnvironment:
    PKG_VERSION: "0.29.37"
    PKG_LICENSE: "Apache-2.0"

checkoutSCM:
    scm: url
    url: "https://files.pythonhosted.org/packages/2a/97/\
        8cc3fe7c6de4796921236a64d00ca8a95565772e57f0d3caae68d880b592/Cython-${PKG_VERSION}.tar.gz"
    digestSHA256: f813d4a6dd94adee5d4ff266191d1d95bf6d4164a4facc535422c021b2504cfb
    stripComponents: 1

buildTools: [target-toolchain]
buildScript: |
    python3BuildSetuptools "$1"

packageScript: |
    python3PackageTgt
    stripAll .
