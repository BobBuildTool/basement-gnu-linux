inherit: ["python3::setuptools"]

metaEnvironment:
    PKG_VERSION: "1.3.10"
    PKG_LICENSE: "MIT"

checkoutSCM:
    scm: url
    url: ${GITHUB_MIRROR}/sqlalchemy/mako/archive/refs/tags/rel_$(subst,.,_,${PKG_VERSION}).tar.gz
    digestSHA256: e8f1334904611d5cb357b6396790fd4375ac21ad901f4314d222d5d5758979b9
    stripComponents: 1

depends:
    - python::markupsafe

buildScript: |
    python3BuildSetuptools $1

packageScript: |
    rsync -a --delete $1/install/ .

provideDeps: ["python::markupsafe"]
