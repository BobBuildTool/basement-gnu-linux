inherit: [patch, "python3::setuptools", "python3::cext"]

metaEnvironment:
    PKG_LICENSE: "BSD-3-Clause"
    PKG_VERSION: "6.0.0"

depends:
    - tools:
          target-toolchain: host-compat-toolchain
      use: [tools]
      depends:
          - libs::libxml2-bin
          - libs::libxslt-bin
    - name: python::cython
      tools:
          target-toolchain: host-compat-toolchain

    - libs::libxml2-dev
    - libs::libxslt-dev
    - use: []
      depends:
          - libs::libxml2-tgt
          - libs::libxslt-tgt

checkoutSCM:
    scm: url
    url: https://github.com/lxml/lxml/archive/refs/tags/lxml-${PKG_VERSION}.tar.gz
    digestSHA256: 5560ee7bd3bcea0e64221bbb23f4ee1d222296ef25ba217e327a5f1d963005d9
    stripComponents: 1

checkoutDeterministic: True
checkoutScript: |
    patchApplySeries $<@lxml/*.patch@>

buildTools: [libxslt-tools, libxml2-tools, target-toolchain]
buildScript: |
    python3BuildSetuptools "$1"

packageScript: |
    python3CExtPackageTgt
provideDeps: [ "*-tgt" ]
