inherit: [autotools, perl5]

metaEnvironment:
    PKG_VERSION: "0.51.0"
    PKG_LICENSE: "GPL-2.0-only"

depends:
    - perl::xml-parser-dev
    - use: []
      depends:
          - perl::xml-parser-tgt

checkoutSCM:
    scm: url
    url: http://launchpad.net/intltool/trunk/${PKG_VERSION}/+download/intltool-${PKG_VERSION}.tar.gz
    digestSHA1: "a0c3bcb99d1bcfc5db70f8d848232a47c47da090"
    stripComponents: 1

buildScript: |
    autotoolsBuild $1

packageScript: |
    autotoolsPackageTgt

provideDeps: ['*-tgt']
