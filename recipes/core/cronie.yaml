# SUMMARY = "Cron daemon for executing programs at set times"
# DESCRIPTION = "Cronie contains the standard UNIX daemon crond that runs \
#                specified programs at scheduled times and related tools. \
#                It is based on the original cron and has security and \
#                configuration enhancements like the ability to use pam \
#                and SELinux."
# HOMEPAGE = "https://github.com/cronie-crond/cronie/"

inherit: [cpackage, pkg-config, make, install]

metaEnvironment:
    PKG_VERSION: "1.7.2"
    PKG_LICENSE: "GPL-2.0"

checkoutSCM:
    scm: url
    url: https://github.com/cronie-crond/cronie/releases/download/cronie-${PKG_VERSION}/cronie-${PKG_VERSION}.tar.gz
    digestSHA256: f1da374a15ba7605cf378347f96bc8b678d3d7c0765269c8242cfe5b0789c571
    stripComponents: 1

buildVars: [CC, CFLAGS, CPPFLAGS, LDFLAGS]
buildTools: [host-toolchain]
buildScript: |
    cp -a $1/ build/

    pushd build
    ./configure \
        --host=aarch64-linux-gnu \
        --prefix=/usr \
        --localstatedir=/

    makeParallel \
        CC="$CC" \
        HOSTCC="gcc" \
        SHARED_LIBS=$([[ $(cpackageLibraryType) == static ]] && echo n || echo y)

    makeParallel \
        DESTDIR="$BOB_CWD/install" \
        install

    popd

#    mkdir -p $BOB_CWD/install/etc/init.d
#    cp cronie.init $BOB_CWD/install/etc/init.d/S20cronie.sh

packageScript: |
    installPackageBin "$1/install/"
