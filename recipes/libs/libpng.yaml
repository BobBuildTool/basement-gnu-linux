inherit: [autotools]

metaEnvironment:
    PKG_VERSION: "1.6.55"
    PKG_LICENSE: "LicenseRef-libpng"
    PKG_LICENSE_PATH: |
        libpng:LICENSE

depends:
    - libs::zlib-dev

    - use: []
      depends:
          - libs::zlib-tgt

checkoutSCM:
    scm: url
    url: ${SOURCEFORGE_MIRROR}/libpng/libpng-${PKG_VERSION}.tar.xz
    digestSHA256: d925722864837ad5ae2a82070d4b2e0603dc72af44bd457c3962298258b8e82d
    stripComponents: 1

buildScript: |
    autotoolsBuild $1

multiPackage:
    dev:
        packageScript: autotoolsPackageDev
        provideDeps: ["*-dev"]

    tgt:
        packageScript: autotoolsPackageTgt
        provideDeps: ["*-tgt"]
