inherit: [meson]

metaEnvironment:
    PKG_VERSION: "1.18.4"
    PKG_LICENSE: "LGPL-2.1-only OR MPL-1.1"

depends:
    - libs::glib-dev
    - libs::libpng-dev
    - libs::pixman-dev
    - libs::zlib-dev
    - libs::freetype-dev
    - libs::fontconfig-dev
    - use: []
      depends:
          - libs::glib-tgt
          - libs::libpng-tgt
          - libs::pixman-tgt
          - libs::zlib-tgt
          - libs::freetype-tgt
          - libs::fontconfig-tgt

checkoutSCM:
    scm: url
    url:  https://www.cairographics.org/releases/cairo-${PKG_VERSION}.tar.xz
    digestSHA256: 445ed8208a6e4823de1226a74ca319d3600e83f6369f99b14265006599c32ccb
    stripComponents: 1

buildTools: [host-toolchain]
buildScript: |
    mesonBuild $1 \
        -Dtests=disabled

multiPackage:
    dev:
        packageScript: mesonPackageDev
        provideDeps: ["*-dev"]

    tgt:
        packageScript: mesonPackageTgt
        provideDeps: ["*-tgt"]
