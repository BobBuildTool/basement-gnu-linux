inherit: [meson]

metaEnvironment:
    PKG_VERSION: "0.46.4"
    PKG_LICENSE: "MIT"

checkoutSCM:
    scm: url
    url: https://www.cairographics.org/releases/pixman-${PKG_VERSION}.tar.gz
    digestSHA256: d09c44ebc3bd5bee7021c79f922fe8fb2fb57f7320f55e97ff9914d2346a591c
    stripComponents: 1

buildScript: |
    mesonBuild $1 \
        -Dtests=disabled \
        -Ddemos=disabled \

multiPackage:
    dev:
        packageScript: mesonPackageDev

    tgt:
        packageScript: mesonPackageTgt
