inherit: [autotools]

metaEnvironment:
    PKG_VERSION: "1.0.29"
    PKG_LICENSE: "LGPL-2.1-or-later"

checkoutSCM:
    scm: url
    url: ${GITHUB_MIRROR}/libusb/libusb/releases/download/v${PKG_VERSION}/libusb-${PKG_VERSION}.tar.bz2
    digestSHA256: "5977fc950f8d1395ccea9bd48c06b3f808fd3c2c961b44b0c2e6e29fc3a70a85"
    stripComponents: 1

buildScript: autotoolsBuild "${1}" --disable-udev

multiPackage:
    dev:
        packageScript: autotoolsPackageDev

    tgt:
        packageScript: autotoolsPackageTgt
