inherit: [meson]

metaEnvironment:
    PKG_VERSION: "12.3.2"
    PKG_LICENSE: "MIT"

depends:
    - libs::cairo-dev
    - libs::freetype-dev
    - libs::glib-dev

    - use: []
      depends:
          - libs::cairo-tgt
          - libs::freetype-tgt
          - libs::glib-tgt

checkoutSCM:
    scm: url
    url:  ${GITHUB_MIRROR}/harfbuzz/harfbuzz/releases/download/${PKG_VERSION}/harfbuzz-${PKG_VERSION}.tar.xz
    digestSHA256: 6f6db164359a2da5a84ef826615b448b33e6306067ad829d85d5b0bf936f1bb8
    stripComponents: 1

buildTools: [glib]
buildScript: |
    mesonBuild $1

multiPackage:
    dev:
        packageScript: mesonPackageDev
        provideDeps: ["*-dev"]

    tgt:
        packageScript: mesonPackageTgt
        provideDeps: ["*-tgt"]
