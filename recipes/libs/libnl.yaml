inherit: [autotools]

metaEnvironment:
    PKG_DESCRIPTION: "Convenience library for netlink sockets"
    PKG_LICENSE: "LGPL-2.1-only"
    PKG_VERSION: "3.12.0"

checkoutSCM:
    scm: url
    url: ${GITHUB_MIRROR}/thom311/libnl/releases/download/libnl$(subst,.,_,${PKG_VERSION})/libnl-${PKG_VERSION}.tar.gz
    digestSHA256: fc51ca7196f1a3f5fdf6ffd3864b50f4f9c02333be28be4eeca057e103c0dd18
    stripComponents: 1

buildTools: [bison, flex, m4]
buildScript: |
    autotoolsBuild $1

multiPackage:
    dev:
        packageScript: |
            autotoolsPackageDev
    tgt:
        packageScript: |
            autotoolsPackageTgt
