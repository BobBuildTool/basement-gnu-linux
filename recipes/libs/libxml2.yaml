inherit: [autotools]

metaEnvironment:
    PKG_VERSION: "2.15.1"
    PKG_LICENSE: "MIT"

checkoutSCM:
    scm: url
    url: https://download.gnome.org/sources/libxml2/2.15/libxml2-${PKG_VERSION}.tar.xz
    digestSHA256: c008bac08fd5c7b4a87f7b8a71f283fa581d80d80ff8d2efd3b26224c39bc54c
    stripComponents: 1

depends:
    - libs::libiconv-dev
    - libs::zlib-dev
    - use: []
      depends:
          - libs::libiconv-tgt
          - libs::zlib-tgt

buildScript: |
    autotoolsBuild ${1} \
        --with-gnu-ld \
        --without-debug \
        --without-python

multiPackage:
    dev:
        provideDeps: ['*-dev']
        packageScript: autotoolsPackageDev

    tgt:
        provideDeps: ['*-tgt']
        packageScript: autotoolsPackageLib

    bin:
        depends:
            - name: libs::libxml2-tgt
              use: []
        packageScript: autotoolsPackageBin
        provideDeps: [ "*-tgt" ]
        provideTools:
            libxml2-tools: "usr/bin"
