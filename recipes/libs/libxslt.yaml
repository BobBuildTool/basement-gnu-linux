inherit: [autotools]

metaEnvironment:
    PKG_VERSION: "1.1.45"
    PKG_LICENSE: "MIT"

depends:
    - libs::libxml2-dev

    - use: []
      depends:
          - libs::libxml2-tgt

checkoutSCM:
    scm: url
    url: https://download.gnome.org/sources/libxslt/1.1/libxslt-${PKG_VERSION}.tar.xz
    digestSHA256: 9acfe68419c4d06a45c550321b3212762d92f41465062ca4ea19e632ee5d216e
    stripComponents: 1

buildScript: |
    autotoolsBuild $1 \
        --without-plugins \
        --without-debug \
        --without-python \
        --without-crypto

multiPackage:
    dev:
        packageScript: autotoolsPackageDev
        provideDeps: [ "*-dev" ]

    tgt:
        packageScript: autotoolsPackageLib
        provideDeps: [ "*-tgt" ]

    bin:
        depends:
            - name: libs::libxslt-tgt
              use: []
        packageScript: autotoolsPackageBin
        provideDeps: [ "*-tgt" ]
        provideTools:
            libxslt-tools: "usr/bin"
