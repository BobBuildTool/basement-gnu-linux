inherit: [cmake]

metaEnvironment:
    PKG_VERSION: "1.11.1"
    PKG_LICENSE: "BSD-3-Clause"

checkoutSCM:
    scm: url
    url: https://libssh2.org/download/libssh2-${PKG_VERSION}.tar.gz
    digestSHA256: d9ec76cbe34db98eec3539fe2c899d26b0c837cb3eb466a56b0f109cabf658f7
    stripComponents: 1

depends:
    - libs::openssl-dev
    - use: []
      depends:
          - libs::openssl-tgt

buildScript: |
    cmakeBuild $1

multiPackage:
    dev:
        provideDeps: ['*-dev']
        packageScript: |
           cmakePackageDev
    tgt:
        provideDeps: ['*-tgt']
        packageScript: |
           cmakePackageTgt
