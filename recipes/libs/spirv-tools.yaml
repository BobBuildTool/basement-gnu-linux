inherit: [cmake]

metaEnvironment:
    PKG_LICENSE: "Apache-2.0"
    PKG_VERSION: "1.4.341.0"

depends:
    - libs::spirv-headers-dev
    - use: []
      depends:
          - libs::spirv-headers-tgt

checkoutSCM:
    scm: url
    url: ${GITHUB_MIRROR}/KhronosGroup/SPIRV-Tools/archive/refs/tags/vulkan-sdk-${PKG_VERSION}.tar.gz
    digestSHA256: 15bfb678138cdf9cd1480dfb952547bbb66b763a735b6d5582578572f5c2e6f9
    stripComponents: 1

buildTools: [python3]
buildScript: |
    cmakeBuild $1 \
        -D SPIRV_WERROR=OFF \
        -D SPIRV-Headers_SOURCE_DIR=${BOB_DEP_PATHS[libs::spirv-headers-dev]}/usr/ \

multiPackage:
    dev:
        provideDeps: ['*-dev']
        packageScript:
            cmakePackageDev
    tgt:
        provideDeps: ['*-tgt']
        packageScript:
            cmakePackageTgt
