inherit: [cmake]

metaEnvironment:
    PKG_VERSION: "3.1.3"
    PKG_LICENSE: "IJG (libjpeg), BSD-3-Clause (TurboJPEG), Zlib (SIMD)"

checkoutSCM:
    scm: url
    url: ${GITHUB_MIRROR}/libjpeg-turbo/libjpeg-turbo/archive/refs/tags/${PKG_VERSION}.tar.gz
    digestSHA256: 3a13a5ba767dc8264bc40b185e41368a80d5d5f945944d1dbaa4b2fb0099f4e5
    stripComponents: 1

buildScript: |
    cmakeBuild $1 \
        -DWITH_JPEG8=ON \
        -DWITH_SIMD=ON \
        -DCMAKE_POSITION_INDEPENDENT_CODE=ON

multiPackage:
    dev:
        packageScript: cmakePackageDev

    tgt:
        packageScript: cmakePackageTgt
