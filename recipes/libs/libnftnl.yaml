inherit: [autotools]

metaEnvironment:
    PKG_VERSION: "1.3.1"
    PKG_LICENSE: "GPL-2.0+"

depends:
    - libs::libmnl-dev

    - use: []
      depends:
          - libs::libmnl-tgt

checkoutSCM:
    scm: url
    url: https://netfilter.org/projects/libnftnl/files/libnftnl-${PKG_VERSION}.tar.xz
    digestSHA256: 607da28dba66fbdeccf8ef1395dded9077e8d19f2995f9a4d45a9c2f0bcffba8
    stripComponents: 1

buildScript: |
    autotoolsBuild $1

multiPackage:
    dev:
        packageScript: autotoolsPackageDev
        provideDeps: [ "*-dev" ]

    tgt:
        packageScript: autotoolsPackageTgt
        provideDeps: [ "*-tgt" ]
