inherit: [meson]

metaEnvironment:
    PKG_VERSION: "1.13.6"
    PKG_LICENSE: "MIT"

checkoutSCM:
    scm: url
    url: https://www.freedesktop.org/software/libevdev/libevdev-${PKG_VERSION}.tar.xz
    digestSHA256: 73f215eccbd8233f414737ac06bca2687e67c44b97d2d7576091aa9718551110
    stripComponents: 1

buildScript: |
    mesonBuild $1 \
        -Ddocumentation=disabled \
        -Dtests=disabled \
        -Dcoverity=false

multiPackage:
    dev:
        packageScript: mesonPackageDev

    tgt:
        packageScript: mesonPackageLib

    bin:
        depends:
            - name: libs::libevdev-tgt
              use: []
        packageScript: mesonPackageBin
        provideDeps: [ "*-tgt" ]
