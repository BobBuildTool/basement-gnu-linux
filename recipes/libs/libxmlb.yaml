inherit: [meson]

metaEnvironment:
    PKG_VERSION: "0.3.25"
    PKG_LICENSE: "LGPL-2.1-or-later"

checkoutSCM:
    scm: url
    url: ${GITHUB_MIRROR}/hughsie/libxmlb/releases/download/${PKG_VERSION}/libxmlb-${PKG_VERSION}.tar.xz
    digestSHA256: 77f2768c9debd2e946173cdf9465efd987849805e7c58251c5772ea728a61d9a
    stripComponents: 1

depends:
    - libs::glib-dev
    - use: []
      depends:
          - libs::glib-tgt

buildScript: |
    mesonBuild $1 \
        -Dintrospection=false \
        -Dgtkdoc=false \
        -Dtests=false \
        -Dcli=false

multiPackage:
    dev:
        provideDeps: ['*-dev']
        packageScript: |
            mesonPackageDev
    tgt:
        provideDeps: ['*-tgt']
        packageScript: |
            mesonPackageTgt
