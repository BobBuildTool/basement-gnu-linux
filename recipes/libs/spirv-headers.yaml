inherit: [cmake]

metaEnvironment:
    PKG_VERSION: "1.4.341.0"
    PKG_LICENSE: "MIT"

checkoutSCM:
    scm: url
    url: https://github.com/KhronosGroup/SPIRV-Headers/archive/refs/tags/vulkan-sdk-${PKG_VERSION}.tar.gz
    digestSHA256: cab0a654c4917e16367483296b44cdb1d614e3120c721beafcd37e3a8580486c
    stripComponents: 1

buildScript: |
    cmakeBuild $1

multiPackage:
    dev:
        packageScript:
            cmakePackageDev
    tgt:
        packageScript:
            cmakePackageTgt
