inherit: [cmake]

metaEnvironment:
    PKG_LICENSE: "LGPL-2.1"
    PKG_VERSION: "0.12.0"

checkoutSCM:
    scm: url
    url: https://www.libssh.org/files/0.12/libssh-${PKG_VERSION}.tar.xz
    digestSHA256: 1a6af424d8327e5eedef4e5fe7f5b924226dd617ac9f3de80f217d82a36a7121
    stripComponents: 1

depends:
    - libs::openssl-dev
    - libs::zlib-dev
    - use: []
      depends:
          - libs::openssl-tgt
          - libs::zlib-tgt

buildScript: |
    cmakeBuild $1

multiPackage:
    dev:
        provideDeps: ['*-dev']
        packageScript: cmakePackageDev
    tgt:
        provideDeps: ['*-tgt']
        packageScript: cmakePackageTgt
