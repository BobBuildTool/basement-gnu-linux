inherit: [meson]

metaEnvironment:
    PKG_VERSION: "1.57.0"
    PKG_LICENSE: "LGPL-2.1-or-later"

depends:
    - name: libs::glib-tools
      use: [tools]
      tools:
          target-toolchain: host-compat-toolchain
    - libs::cairo-dev
    - libs::fontconfig-dev
    - libs::freetype-dev
    - libs::fribidi-dev
    - libs::glib-dev
    - libs::gnome::json-glib-dev
    - libs::harfbuzz-dev

    - use: []
      depends:
          - libs::cairo-tgt
          - libs::fontconfig-tgt
          - libs::freetype-tgt
          - libs::fribidi-tgt
          - libs::gnome::json-glib-tgt
          - libs::glib-tgt
          - libs::harfbuzz-tgt

checkoutSCM:
    scm: url
    url: https://download.gnome.org/sources/pango/1.57/pango-${PKG_VERSION}.tar.xz
    digestSHA256: 890640c841dae77d3ae3d8fe8953784b930fa241b17423e6120c7bfdf8b891e7
    stripComponents: 1

buildTools: [glib]
buildScript: |
    mesonBuild $1

multiPackage:
    dev:
        packageScript: mesonPackageDev
        provideDeps: ["*-dev"]

    tgt:
        packageScript: mesonPackageTgt
        provideDeps: ["*-tgt"]
