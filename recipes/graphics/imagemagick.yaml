inherit: [autotools]

depends:
    - libs::freetype-dev
    - libs::libiconv-dev
    - libs::libpng-dev
    - libs::libxml2-dev
    - virtual::libs::libjpeg-dev

    - use: []
      depends:
          - libs::freetype-tgt
          - libs::libiconv-tgt
          - libs::libpng-tgt
          - libs::libxml2-tgt
          - virtual::libs::libjpeg-tgt

metaEnvironment:
    PKG_VERSION: "7.1.2-15"
    PKG_LICENSE: "Apache-2.0"

checkoutSCM:
    scm: url
    url: ${GITHUB_MIRROR}/ImageMagick/ImageMagick/archive/refs/tags/${PKG_VERSION}.tar.gz
    digestSHA256: bf646e7fffdf50b7d886eec6bbe51c3ced1c4d68fbabfcc534e014575359fe7f
    stripComponents: 1

buildScript: |
    autotoolsBuild $1

packageScript: |
    autotoolsPackageTgt

provideDeps: ["*-tgt"]

provideTools:
    imagemagick: "usr/bin"
