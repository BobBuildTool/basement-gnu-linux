inherit: [cpackage, make, install]

metaEnvironment:
    PKG_VERSION: "6.19.0"
    PKG_LICENSE: "GPL-2.0+"

checkoutSCM:
    scm: url
    url: ${KERNEL_MIRROR}/linux/utils/net/iproute2/iproute2-${PKG_VERSION}.tar.xz
    digestSHA256: "9332213d35480b647086a70c302de8568de83455a98774d35de216c4ce191006"
    stripComponents: 1

buildVars: [CC, AR]
buildTools: [host-toolchain, bison, flex, m4]
buildScript: |
    cp -a $1/ build/

    pushd build
    ./configure

    makeParallel \
        CC="$CC" \
        HOSTCC="gcc" \
        SHARED_LIBS=$([[ $(cpackageLibraryType) == static ]] && echo n || echo y) \
        all

    makeParallel \
        DESTDIR=$BOB_CWD/install \
        install

    popd

packageScript: |
    installPackageBin "$1/install/"
