inherit: [autotools]

metaEnvironment:
    PKG_VERSION: "7.98"
    PKG_LICENSE: "LicenseRef-Nmap"
    PKG_LICENSE_PATH: |
        Nmap:LICENSE

depends:
    - libs::libpcap-dev
    - libs::libpcre2-dev
    - libs::libssh2-dev
    - libs::openssl-dev
    - libs::zlib-dev
    - use: []
      depends:
          - libs::libpcap-tgt
          - libs::libpcre2-tgt
          - libs::libssh2-tgt
          - libs::openssl-tgt
          - libs::zlib-tgt

checkoutSCM:
    scm: url
    url: https://nmap.org/dist/nmap-${PKG_VERSION}.tar.bz2
    digestSHA256: ce847313eaae9e5c9f21708e42d2ab7b56c7e0eb8803729a3092f58886d897e6
    stripComponents: 1

buildTools: [python3]
buildVars: [AR, CC, RANLIB]
buildSetup: |
    # Makefile has hard-coded ar and ranlib calls..
    mkdir -p __bin
    pushd __bin
    ln -snf $(which ${AR}) ar
    ln -snf $(which ${RANLIB}) ranlib
    export PATH=$(pwd):${PATH}
    popd

buildScript: |
    mkdir -p build
    rsync -a --delete $1/ build/
    autotoolsBuild $(pwd)/build \
      --without-liblua \
      --without-zenmap \
      --enable-static
    # shared linking fails with:
    # cannot find ./libdnet-stripped/src/.libs/libdnet.a: No such file or directory

provideDeps: ['*-tgt']
packageScript: |
    autotoolsPackageTgt
